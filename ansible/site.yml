---
# Main playbook. Configures the local machine (mac or Debian/Ubuntu).
#
#   Everything:       ansible-playbook site.yml
#   Subset by tag:    ansible-playbook site.yml --tags zsh,vim
#   Skip a component: ansible-playbook site.yml --skip-tags docker,apps
#   Server preset:    ansible-playbook site.yml --tags server  # all but apps/fonts
#
# The 'server' tag is a meta-tag applied to every role that makes sense on a
# headless machine (i.e. everything except apps/fonts, which are desktop-only).
#
# Normally invoked through ../bootstrap.sh, which also handles sudo detection.
- name: Set up local machine
  hosts: local
  gather_facts: true

  # On a fresh Debian/Ubuntu host the boot-time apt-daily / unattended-upgrades
  # timers grab the dpkg lock, so any apt task that runs first fails with
  # "Unable to acquire the dpkg frontend lock". Give every apt call a generous
  # lock_timeout as a backstop; the pre_task below waits the initial lock out.
  module_defaults:
    ansible.builtin.apt:
      lock_timeout: 300

  # pre_tasks are tagged 'always' so they still run when the playbook is invoked
  # with --tags (e.g. bootstrap.sh --tags server); otherwise tag filtering would
  # skip them and the lock wait below would never happen.
  pre_tasks:
    - name: Fail on unsupported OS
      ansible.builtin.fail:
        msg: >-
          Unsupported OS family '{{ ansible_facts['os_family'] }}'.
          This playbook supports macOS (Darwin) and Debian/Ubuntu.
      when: ansible_facts['os_family'] not in ['Darwin', 'Debian']
      tags: [always]

    # Detect the lock holders by process rather than by the lock files: `fuser`
    # (psmisc) is missing on minimal cloud images, whereas `pgrep` (procps) is an
    # essential package and always present. The task retries while any apt/dpkg
    # process is running and fails loudly if it never clears (e.g. a wedged dpkg
    # needing `dpkg --configure -a`) instead of falling through into the apt task.
    - name: Wait for boot-time apt/dpkg activity to finish
      ansible.builtin.shell: |
        if pgrep -x dpkg >/dev/null || pgrep -x apt >/dev/null \
           || pgrep -x apt-get >/dev/null || pgrep -f unattended-upgr >/dev/null; then
          exit 1   # still busy
        fi
        exit 0     # lock holders gone
      args:
        executable: /bin/bash
      register: apt_busy
      changed_when: false
      retries: 60
      delay: 10
      until: apt_busy.rc == 0
      become: true
      when: ansible_facts['os_family'] == 'Debian'
      tags: [always]

  roles:
    - { role: core,     tags: ['core', 'server'] }
    - { role: dotfiles, tags: ['dotfiles', 'server'] }
    - { role: zsh,      tags: ['zsh', 'shell', 'server'] }
    - { role: starship, tags: ['starship', 'shell', 'server'] }
    - { role: tmux,     tags: ['tmux', 'server'] }
    - { role: vim,      tags: ['vim', 'server'] }
    - { role: fonts,    tags: ['fonts'] }
    - { role: python,   tags: ['python', 'server'] }
    - { role: docker,   tags: ['docker', 'server'] }
    - { role: apps,     tags: ['apps'] }
